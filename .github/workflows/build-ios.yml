name: Build iOS IPA

# Manual only. This produces an unsigned iOS device .ipa from the standalone
# Expo app without requiring Expo, Apple, or signing secrets.
on:
  workflow_dispatch:

jobs:
  # An *unsigned* device .ipa — no Apple Developer account or signing secrets.
  # We archive for a real device with code signing disabled, then hand-package
  # the .app into a Payload/ folder and zip it as .ipa (the .ipa format is just
  # a zip of Payload/<App>.app). Release config bundles the JS so it runs
  # without Metro.
  #
  # The .ipa is NOT directly installable as-is (iOS rejects unsigned apps):
  # re-sign it with Sideloadly / AltStore, or install on a jailbroken device.
  #
  # React Native 0.81 needs Xcode >= 16.1; the macos-15 image ships Xcode 16.x
  # (macos-14 only had 15.4, which fails `pod install` with "Please upgrade XCode").
  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Prebuild native ios project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Archive for device (no code signing)
        working-directory: ios
        run: |
          set -euo pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          # The app scheme matches the .xcodeproj name Expo prebuild generates
          # (e.g. TireShop). Don't pick schemes[0] — that's an alphabetical Pod
          # dependency scheme, which builds a static lib and emits no .app.
          SCHEME=$(basename "$(ls -d *.xcodeproj | head -1)" .xcodeproj)
          echo "Workspace=$WORKSPACE  Scheme=$SCHEME"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/app.xcarchive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" DEVELOPMENT_TEAM=""

      - name: Package unsigned .ipa
        working-directory: ios
        run: |
          set -euo pipefail
          APP=$(find build/app.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -1)
          echo "App bundle: $APP"
          rm -rf Payload
          mkdir Payload
          cp -R "$APP" Payload/
          # A .ipa is just a zip with the app under a top-level Payload/ dir.
          zip -qry "$GITHUB_WORKSPACE/tire-shop.ipa" Payload
          unzip -l "$GITHUB_WORKSPACE/tire-shop.ipa" | head

      - uses: actions/upload-artifact@v7
        with:
          name: tire-shop-ios-ipa
          path: tire-shop.ipa
          if-no-files-found: error
