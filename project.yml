name: TireShop
options:
  bundleIdPrefix: com.tireforce
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  StripeTerminal:
    url: https://github.com/stripe/stripe-terminal-ios
    from: 5.6.0
  StripePaymentSheet:
    url: https://github.com/stripe/stripe-ios-spm
    from: 26.1.0
targets:
  TireShop:
    type: application
    platform: iOS
    sources:
      - path: TireShop
    dependencies:
      - package: StripeTerminal
        product: StripeTerminal
      - package: StripePaymentSheet
        product: StripePaymentSheet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tireforce.salesystemi
        DEVELOPMENT_TEAM: C8S3S8T2K2
        CODE_SIGN_ENTITLEMENTS: TireShop/TireShop.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TireShop/Info.plist
